services:
  - type: web
    name: academics-management-system
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn vsu_timetable.wsgi:application"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        value: vsu-django-secret-key-change-in-production-xK9pLmQ2024
      - key: PYTHON_VERSION
        value: 3.11.0